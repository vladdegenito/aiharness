name: CI

# Trigger on pushes and PRs to the default branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: read-only access to the repository contents.
permissions:
  contents: read

jobs:
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Runs the Vitest workspace: workerd pool (Workers tests) + Node pool (ajv SARIF-schema test).
        # No Cloudflare credentials or Docker required for the test suite.
        run: npm test

      - name: Type-check
        run: npx tsc --noEmit

# NOTE: wrangler deploy is intentionally excluded from CI.
# Deployment requires Docker (to build the Semgrep container image) and
# Cloudflare secrets (KEK, DEMO_ANTHROPIC_KEY). Deploy is performed manually
# or via a separate, secrets-enabled workflow after tests pass.
